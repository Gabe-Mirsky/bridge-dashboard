<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bridge Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="header"> 
    <div class="header-left">
      <img src="/static/bridge-logo.png" class="logo">
    </div>

    <div class="header-center">
      <div class="dashboard-title">Bridge Markets Dashboard</div>
    </div>

    <div class="header-right">
      <div id="clock"></div>
      <div id="fullscreen-toggle">
      ⛶
    </div>
    </div>
  </div>

  <div class="grid">

    <!-- Q1 -->
    <div class="quadrant" id="q1">
      <div class="quad-inner">
        <div class="quad-title">Power Markets</div>
      </div>
    </div>
    <!-- Q2 -->
    <div class="quadrant main" id="q2"> 
      <div class="title-row"> 
        <div class="q2-title">Market Snapshot</div> 
        <h1 id="asset-name">SPY</h1> </div> 
        <div id="price">$0.00</div> 
        <div id="change">0.00%</div> </div>
    <!-- Q3 -->
    <div class="quadrant" id="q3">
      <div class="quad-inner">

        <div class="q3-header">
          <div class="q3-title">Oil &amp; Fuels</div>
        </div>
        <div id="oil-gas-board"></div>

      </div>
    </div>
    <!-- Q4 -->
    <div class="quadrant" id="q4">
      <div id="q4-headlines-shell" class="q4-view-shell active">
        <div class="news-title">Latest Headlines</div>
        <div id="news-container">
          <div class="news-item" id="headline-1"></div>
          <div class="news-item" id="headline-2"></div>
          <div class="news-item" id="headline-3"></div>
        </div>
      </div>

      <div id="q4-weather-shell" class="q4-view-shell">
        <div class="q4-weather-header">
          <div class="quad-title q4-weather-title-box">Weather Views</div>
          <div id="weather-view-label">Regional 7-Day</div>
        </div>

        <div id="weather-rotator">
          <div class="weather-loading">Loading official weather and NOAA outlooks...</div>
        </div>
      </div>
    </div>

  </div>

  <script src="/static/script.js"></script>
</body>
</html>
